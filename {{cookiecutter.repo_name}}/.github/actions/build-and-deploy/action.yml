name: Build and Deploy Databricks Bundle
description: Build artifacts and deploy Databricks bundle to target environment.

inputs:
  target:
    description: Databricks bundle target (for example dev, tst, prod).
    required: true
  working_directory:
    description: Working directory for build commands.
    required: true
  is_python:
    description: Set to true for Python builds and false for Scala builds.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Run sbt clean test and compile
      if: inputs.is_python != 'true'
      shell: bash
      working-directory: "{{ '${{ inputs.working_directory }}' }}"
      env:
        GITHUB_ACTOR: "{{ '${{ github.actor }}' }}"
        GITHUB_TOKEN: "{{ '${{ github.token }}' }}"
      run: sbt clean compile test

    - name: Extract version from sbt
      id: get_version
      if: inputs.is_python != 'true'
      shell: bash
      working-directory: "{{ '${{ inputs.working_directory }}' }}"
      env:
        GITHUB_ACTOR: "{{ '${{ github.actor }}' }}"
        GITHUB_TOKEN: "{{ '${{ github.token }}' }}"
      run: |
        VERSION=$(sbt -Dsbt.log.noformat=true "show version" | tail -n 1 | tr -d ' ' | grep -Eo '[0-9]+\.[0-9]+(\.[0-9]+)?(-[A-Za-z0-9.-]+)?$')
        if [ -z "$VERSION" ]; then
          echo "Error: Failed to extract version from sbt"
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Extracted version: $VERSION"

    - name: Build artifacts
      if: inputs.is_python != 'true'
      shell: bash
      working-directory: "{{ '${{ inputs.working_directory }}' }}"
      env:
        GITHUB_ACTOR: "{{ '${{ github.actor }}' }}"
        GITHUB_TOKEN: "{{ '${{ github.token }}' }}"
      run: sbt clean package

    - name: Install dependencies
      if: inputs.is_python == 'true'
      shell: bash
      working-directory: "{{ '${{ inputs.working_directory }}' }}"
      run: uv sync --group dev

    - name: Check code formatting
      if: inputs.is_python == 'true'
      shell: bash
      working-directory: "{{ '${{ inputs.working_directory }}' }}"
      run: uv run ruff format --check --diff src/

    - name: Lint code
      if: inputs.is_python == 'true'
      shell: bash
      working-directory: "{{ '${{ inputs.working_directory }}' }}"
      run: uv run ruff check src/

    - name: Databricks bundle validate
      shell: bash
      working-directory: "{{ '${{ inputs.working_directory }}' }}"
      env:
        DATABRICKS_AUTH_TYPE: azure-cli
      run: databricks bundle validate --target "{{ '${{ inputs.target }}' }}"

    - name: Databricks bundle deploy (Scala)
      if: inputs.is_python != 'true'
      shell: bash
      working-directory: "{{ '${{ inputs.working_directory }}' }}"
      env:
        ARM_USE_OIDC: true
      run: |
        databricks bundle deploy --target "{{ '${{ inputs.target }}' }}" --var="artifact_version={{ '${{ steps.get_version.outputs.version }}' }}"

    - name: Databricks bundle deploy (Python)
      if: inputs.is_python == 'true'
      shell: bash
      working-directory: "{{ '${{ inputs.working_directory }}' }}"
      env:
        ARM_USE_OIDC: true
      run: databricks bundle deploy --target "{{ '${{ inputs.target }}' }}"
